spring:
  datasource:
    url: jdbc:tc:mysql:8.0:///mss_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: test-secret-key-for-testing-only-minimum-32chars
  expiration-ms: 3600000

redis:
  lock:
    wait-time: 5
    lease-time: 10

enrollment:
  max-credits: 18
  queue-multiplier: 100
  queue-ttl-hours: 1
